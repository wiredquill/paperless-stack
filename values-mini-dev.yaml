# Paperless Stack - mini-dev configuration
# Core services only (no GPU/AI)

# Disable AI services that need GPU
ollama:
  enabled: false
openWebui:
  enabled: false
paperlessAi:
  enabled: false
paperlessGpt:
  enabled: false

# Use real secrets
global:
  domain: paperless.mini-dev.local
  ingressClass: nginx
  namespace: paperless-dev

paperless:
  env:
    PAPERLESS_DBPASS: paperless-secure-pw-2024
    PAPERLESS_ADMIN_PASSWORD: admin-secure-pw-2024
    PAPERLESS_URL: http://localhost:8000

postgres:
  env:
    POSTGRES_PASSWORD: paperless-secure-pw-2024

# No loadbalancer needed for single-node cluster
loadbalancer:
  enabled: false

# Enable ingress for local testing
ingress:
  enabled: true
  hosts:
    - host: paperless.mini-dev.local
      paths:
        - path: /
          pathType: Prefix
          service: paperless
          port: 8000
  className: nginx

services:
  paperless:
    type: ClusterIP
    port: 8000
    targetPort: 8000

# Disable dozzle
dozzle:
  enabled: false
