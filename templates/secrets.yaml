{{/*
Generate secrets for database passwords and API tokens if not provided.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperless-stack.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.paperless.enabled }}
  {{- $pass := include "paperless-stack.generateSecret" .Values.paperless.env.PAPERLESS_DBPASS }}
  PAPERLESS_DBPASS: {{ $pass }}
  {{- $adminPass := include "paperless-stack.generateSecret" .Values.paperless.env.PAPERLESS_ADMIN_PASSWORD }}
  PAPERLESS_ADMIN_PASSWORD: {{ $adminPass }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ include "paperless-stack.generateSecret" .Values.postgres.env.POSTGRES_PASSWORD }}
  {{- end }}
