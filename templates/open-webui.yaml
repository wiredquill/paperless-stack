{{- if .Values.openWebui.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  type: {{ .Values.services.openWebui.type }}
  ports:
    - port: {{ .Values.services.openWebui.port }}
      targetPort: {{ .Values.services.openWebui.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "paperless-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  replicas: {{ .Values.openWebui.replicaCount }}
  selector:
    matchLabels:
      {{- include "paperless-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webui
  template:
    metadata:
      labels:
        {{- include "paperless-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webui
    spec:
      containers:
        - name: open-webui
          image: "{{ .Values.openWebui.image.repository }}:{{ .Values.openWebui.image.tag }}"
          imagePullPolicy: {{ .Values.openWebui.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.openWebui.targetPort }}
              name: http
          env:
            - name: OLLAMA_BASE_URL
              value: {{ .Values.openWebui.ollamaUrl | quote }}
            - name: WEBUI_SECRET_KEY
              value: {{ include "paperless-stack.generateSecret" nil }}
          resources:
            {{- toYaml .Values.openWebui.resources | nindent 12 }}
          volumeMounts:
            - name: open-webui-data
              mountPath: {{ .Values.openWebui.data.mountPath }}
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.openWebui.data.storageClass }}
  storageClassName: {{ .Values.openWebui.data.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.openWebui.data.size }}
{{- end }}
