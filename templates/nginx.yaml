{{- if .Values.loadbalancer.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: loadbalancer
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      client_max_body_size 100m;

      # Paperless-ngx
      upstream paperless {
        server {{ .Values.loadbalancer.upstreams.paperless }};
      }

      # Open WebUI
      upstream webui {
        server {{ .Values.loadbalancer.upstreams.openwebui }};
      }

      # Paperless AI
      upstream paperless_ai {
        server {{ .Values.loadbalancer.upstreams.paperlessai }};
      }

      # Paperless GPT
      upstream paperless_gpt {
        server {{ .Values.loadbalancer.upstreams.paperlessgpt }};
      }

      # Default server - catch all unknown hosts
      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
      }

      # Paperless-ngx
      server {
        listen 80;
        listen [::]:80;
        server_name paperless.wiredquill.com;

        location / {
          proxy_pass http://paperless;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 3600;
          proxy_send_timeout 3600;
          client_max_body_size 100m;
        }

        location /websocket/ {
          proxy_pass http://paperless;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/ {
          proxy_pass http://paperless;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }

      # Open WebUI
      server {
        listen 80;
        listen [::]:80;
        server_name webui.wiredquill.com;

        location / {
          proxy_pass http://webui;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
          proxy_pass http://webui;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }

      # Paperless AI
      server {
        listen 80;
        listen [::]:80;
        server_name paperless-ai.wiredquill.com;

        location / {
          proxy_pass http://paperless_ai;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 3600;
        }
      }

      # Paperless GPT
      server {
        listen 80;
        listen [::]:80;
        server_name paperless-gpt.wiredquill.com;

        location / {
          proxy_pass http://paperless_gpt;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }

      {{- if .Values.dozzle.enabled }}
      # Dozzle
      server {
        listen 80;
        listen [::]:80;
        server_name dozzle.wiredquill.com;

        location / {
          proxy_pass http://dozzle;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
      {{- end }}
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: loadbalancer
spec:
  replicas: {{ .Values.loadbalancer.replicaCount }}
  selector:
    matchLabels:
      {{- include "paperless-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: loadbalancer
  template:
    metadata:
      labels:
        {{- include "paperless-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loadbalancer
    spec:
      containers:
        - name: nginx
          image: {{ .Values.loadbalancer.image.repository }}:{{ .Values.loadbalancer.image.tag }}
          imagePullPolicy: {{ .Values.loadbalancer.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.loadbalancer.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: loadbalancer
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "paperless-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: loadbalancer
{{- end }}
